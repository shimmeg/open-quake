<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' http: https: file: data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: file: http: https:; font-src 'self' data:; connect-src 'self'; media-src 'self' blob: data:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';">
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
  #stage { position: absolute; top: 0; left: 0; width: 1920px; height: 480px;
    transform-origin: 0 0; transform: translate(480px, 0) rotate(90deg);
    background: radial-gradient(140% 200% at 0% 0%, #0e1b2e 0%, #05080d 70%);
    font-family: 'Segoe UI', system-ui, sans-serif; }
  #grid { display: grid; width: 1920px; height: 480px; gap: 10px; padding: 12px; box-sizing: border-box; }
  #web { position: absolute; top: 0; left: 0; width: 1920px; height: 480px; border: 0; background: #05080d; display: none; }
  #web.show { display: flex; }
  .tile { display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 18px; background: linear-gradient(160deg, #18293d, #0c141f);
    border: 1px solid #243a55; color: #cfe0f2; user-select: none;
    transition: transform .06s, background .06s, border-color .06s; }
  .tile.empty { background: #0a111a; border: 1px dashed #1b2838; }
  .tile .ic { font-size: 60px; line-height: 1; }
  .tile .ic-img { width: 64px; height: 64px; object-fit: contain; }
  .tile .lb { font-size: 20px; margin-top: 8px; color: #9fb3c8; }
  .tile.span .ic { font-size: 104px; }
  .tile.span .ic-img { width: 104px; height: 104px; }
  .tile.span .lb { font-size: 26px; }
  .tile.hit { background: linear-gradient(160deg, #2b8bff, #0a5bd0); border-color: #7CFFB2;
    color: #fff; transform: scale(.95); box-shadow: 0 0 28px rgba(43,139,255,.55); }
  #vol { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); font-size: 44px;
    color: #7CFFB2; background: rgba(5,10,16,.85); padding: 18px 30px; border-radius: 16px;
    opacity: 0; transition: opacity .12s; pointer-events: none; }
  /* dial selector */
  #selector { position: absolute; inset: 0; background: rgba(3,6,10,.92); display: none;
    flex-direction: column; align-items: center; justify-content: center; color: #e8eef6; }
  #selector.open { display: flex; }
  .seltitle { font-size: 30px; color: #7CFFB2; letter-spacing: 2px; margin-bottom: 8px; }
  .selwheel { height: 300px; width: 760px; overflow: hidden; position: relative;
    -webkit-mask-image: linear-gradient(#0000, #000 32%, #000 68%, #0000); }
  #selitems { position: absolute; left: 0; right: 0; top: 50%; transition: transform .14s ease-out; }
  .selitem { height: 76px; display: flex; align-items: center; justify-content: center;
    font-size: 34px; color: #5f7790; transform: translateY(-50%); }
  .selitem.sel { font-size: 52px; font-weight: 800; color: #fff; text-shadow: 0 0 22px rgba(124,255,178,.6); }
  .selhint { margin-top: 10px; font-size: 20px; color: #6b809a; }
  /* first-run intro overlay */
  #intro { position: absolute; inset: 0; background: rgba(3,6,10,.96); display: none; z-index: 20;
    flex-direction: column; align-items: center; justify-content: center; color: #e8eef6; }
  #intro.open { display: flex; }
  .introicon { font-size: 84px; line-height: 1; margin-bottom: 4px; }
  .introtitle { font-size: 44px; font-weight: 800; color: #fff; text-align: center; padding: 0 40px;
    text-shadow: 0 0 22px rgba(124,255,178,.5); }
  .introsub { font-size: 23px; color: #9fb3c8; margin-top: 12px; text-align: center; padding: 0 60px; }
  .introok { margin-top: 24px; font-size: 30px; font-weight: 700; color: #04121f; background: #7CFFB2;
    border: none; border-radius: 14px; padding: 13px 64px; cursor: pointer; box-shadow: 0 0 28px rgba(124,255,178,.45); }
  .introok:active { transform: scale(.96); }
</style>
</head>
<body>
  <div id="stage">
    <div id="grid"></div>
    <webview id="web" src="about:blank" partition="persist:dashboards"></webview>
    <div id="vol">🔊</div>
    <div id="selector"><div class="seltitle">SELECT PAGE</div><div class="selwheel"><div id="selitems"></div></div><div class="selhint">rotate to choose · press to select</div></div>
    <div id="intro">
      <div class="introicon">🔘</div>
      <div class="introtitle">Double-click the knob to switch pages</div>
      <div class="introsub">Use it any time to move between your launcher, dashboards, and apps.</div>
      <button class="introok" id="introok">OK</button>
    </div>
  </div>
<script src="index.js"></script>
</body>
</html>
