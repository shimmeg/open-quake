<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' http: https: file: data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: file: http: https:; font-src 'self' data:; connect-src 'self'; media-src 'self' blob: data:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; height: 100vh; display: flex; flex-direction: column;
    font-family: 'Segoe UI', system-ui, sans-serif; background: #11151c; color: #dbe5f0; }
  header { padding: 12px 18px; background: #0c1016; border-bottom: 1px solid #1e2733; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; margin: 0; font-weight: 700; }
  header .sub { color: #6f8298; font-size: 13px; }
  .main { flex: 1; display: flex; min-height: 0; }
  .col { padding: 14px; overflow: auto; }
  .grids { width: 240px; border-right: 1px solid #1e2733; }
  .editor { flex: 1; }
  .sectitle { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #6f8298; margin: 0 0 8px; }
  .gridrow { padding: 9px 11px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
  .gridrow:hover { background: #182230; }
  .gridrow.active { background: #16314f; border-color: #2b6fb0; }
  .gridrow .badge { font-size: 11px; color: #7CFFB2; }
  button { background: #1c2735; color: #dbe5f0; border: 1px solid #2a3a4e; border-radius: 7px; padding: 7px 12px; cursor: pointer; font-size: 13px; }
  button:hover { background: #243246; }
  button.primary { background: #1e6fd0; border-color: #2b8bff; }
  button.primary:disabled { background: #18222e; border-color: #243246; color: #5b6b7e; cursor: default; }
  button.danger { background: #6a1e2a; border-color: #a3354a; }
  input, select { background: #0e141c; color: #dbe5f0; border: 1px solid #2a3a4e; border-radius: 6px; padding: 7px 9px; font-size: 13px; width: 100%; }
  .row { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
  .row label { width: 70px; color: #91a4ba; font-size: 13px; flex: none; }
  .secretwrap { display: flex; gap: 6px; align-items: stretch; flex: 1; min-width: 0; }
  .secretwrap input { flex: 1; min-width: 0; width: auto; }
  .reveal { flex: none; width: 34px; padding: 0; font-size: 14px; line-height: 1; }
  .tilegrid { display: grid; gap: 8px; margin: 10px 0 12px; }
  .cell { border-radius: 12px; background: #141d29; border: 1px solid #233246; cursor: pointer; user-select: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center; color: #bcd; overflow: hidden; }
  .cell:hover { border-color: #2b6fb0; }
  .cell.empty { background: #0d141d; border-style: dashed; color: #3a4a5e; }
  .cell.sel { border-color: #7CFFB2; box-shadow: 0 0 0 2px rgba(124,255,178,.45); }
  .cell.insel { background: #1b4a7a !important; border-color: #4ea3ff; box-shadow: inset 0 0 0 3px #4ea3ff; }
  .cell .ic { font-size: 30px; line-height: 1; } .cell .lb { font-size: 12px; margin-top: 4px; color: #91a4ba; }
  .cell.span .ic { font-size: 48px; } .cell.span .cimg { width: 52px; height: 52px; }
  .cell .cimg { width: 34px; height: 34px; object-fit: contain; }
  .cell.dragover { border-color: #7CFFB2; box-shadow: 0 0 0 2px #7CFFB2; }
  .cell img { pointer-events: none; -webkit-user-drag: none; }
  .mergebar { display: flex; align-items: center; gap: 12px; margin: 0 0 14px; min-height: 20px; }
  .mergebar.active { background: #13243a; border: 1px solid #2b6fb0; border-radius: 8px; padding: 10px 14px; }
  .mergebar .hint { margin: 0; }
  .mergebar b { color: #cfe0f2; }
  .panes { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .form { background: #0e141c; border: 1px solid #1e2733; border-radius: 10px; padding: 14px; flex: 1; min-width: 360px; max-width: 460px; }
  .iconbox { background: #0e141c; border: 1px solid #1e2733; border-radius: 10px; padding: 14px; width: 320px; flex: none; }
  .iconopt { display: flex; align-items: center; gap: 8px; padding: 6px 0; cursor: pointer; font-size: 14px; color: #cfe0f2; }
  .iconopt input { width: auto; }
  .iconopt.disabled { opacity: .45; cursor: default; }
  .iconopt .note { color: #6f8298; font-size: 12px; }
  .icondetail { margin: 6px 0 0 26px; min-height: 8px; }
  .icondetail .row { margin: 4px 0; }
  .iconpreview { margin-top: 14px; height: 84px; display: flex; align-items: center; justify-content: center;
    background: #0a111a; border: 1px solid #1b2838; border-radius: 10px; }
  .iconpreview .em { font-size: 52px; line-height: 1; }
  .iconpreview img { width: 64px; height: 64px; object-fit: contain; }
  .iconpreview .none { color: #41566b; font-size: 13px; }
  .hint { color: #6f8298; font-size: 12px; margin-top: 8px; }
  footer { padding: 12px 18px; background: #0c1016; border-top: 1px solid #1e2733; display: flex; align-items: center; gap: 14px; }
  footer .state { font-size: 13px; margin-right: auto; }
  footer .state.dirty { color: #ffb454; }
  footer .state.saved { color: #7CFFB2; }
  footer button.primary { padding: 9px 30px; font-size: 14px; }
</style>
</head>
<body>
  <header>
    <h1>open-quake Editor</h1>
    <span class="sub">edit, then Save to apply to the panel</span>
    <span class="sub" style="flex:1; text-align:center">🔘 Double-click the knob to switch pages</span>
    <button id="settingsBtn">⚙ Settings</button>
  </header>
  <div class="main">
    <div class="col grids">
      <p class="sectitle">Pages</p>
      <div id="gridlist"></div>
      <div class="row" style="margin-top:12px; gap:6px; flex-wrap:wrap"><button class="primary" id="addGrid">+ Grid</button><button id="addDash">+ Dashboard</button><button id="addApp">+ App</button></div>
    </div>
    <div class="col editor">
      <div id="gridmeta"></div>
      <div id="tilegrid" class="tilegrid"></div>
      <div id="mergebar" class="mergebar"></div>
      <div class="panes">
        <div id="tileform"></div>
        <div id="iconpane"></div>
      </div>
    </div>
  </div>
  <footer>
    <span id="state" class="state"></span>
    <button class="primary" id="saveBtn" disabled>Save</button>
  </footer>
<script src="config.js"></script>
</body>
</html>
