<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' http: https: file: data: blob:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: file: http: https:; font-src 'self' data:; connect-src 'self' http: https:; media-src 'self' blob: data:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';">
<title>Open WebUI</title>
<link rel="stylesheet" href="./owui-widget.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 19px; }                 /* scale the widget up for panel legibility (it sizes in rem) */
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05080d; }
  #chat-widget { width: 100vw; height: 100vh; }

  /* dark-theme the widget to match the panel (the bundled theme is light).
     #chat-widget id beats the widget's scoped classes, so these win. */
  #chat-widget .wrapper { background: #05080d; color: #e8eef6; border-radius: 0; box-shadow: none; }
  #chat-widget .header { background: #0b1119; border-bottom-color: #1a2330; }
  #chat-widget .header-title { color: #e8eef6; }
  #chat-widget .messages { background: #05080d; }
  #chat-widget .message-wrapper.user { background: #0e1620; }
  #chat-widget .message-wrapper.assistant { background: #05080d; }
  #chat-widget .message { color: #dfe7f0; }
  #chat-widget .input-container { background: #0b1119; border-top-color: #1a2330; }
  #chat-widget .input-wrapper { background: #0e1620; border-color: #26303f; }
  #chat-widget .input-wrapper:focus-within { border-color: #7CFFB2; }
  #chat-widget textarea { color: #e8eef6; }
  #chat-widget textarea::placeholder { color: #7e93ab; }
  #chat-widget button { background: transparent; color: #9fb3c8; }
  #chat-widget button:hover:not(:disabled) { color: #7CFFB2; }
  #chat-widget .markdown-content code,
  #chat-widget .markdown-content pre { background: #0e1620; border-color: #26303f; color: #dfe7f0; }
  #chat-widget .markdown-content pre code { background: none; border: none; }
  #chat-widget .markdown-content a { color: #7CFFB2; }
  #chat-widget .markdown-content blockquote { border-left-color: #26303f; color: #9fb3c8; }

  #nokey { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center;
    color: #9fb3c8; font-family: "Segoe UI", system-ui, sans-serif; text-align: center; padding: 0 60px; gap: 12px; }
  #nokey .big { font-size: 30px; font-weight: 800; color: #e8eef6; }
</style>
</head>
<body>
  <div id="chat-widget"></div>
  <div id="nokey">
    <div class="big">Open WebUI needs setup</div>
    <div>Open this page in the editor and set your <b>Open WebUI URL</b> and <b>API key</b>.</div>
  </div>
  <script>
    window.openQuakeChatRuntimeConfig = {};
    window.openQuakeChatConfig = async function () {
      try {
        var r = await fetch('/app-config?app=chat', { cache: 'no-store' });
        if (!r.ok) return window.openQuakeChatRuntimeConfig;
        var data = await r.json();
        var opts = (data && data.options) || {};
        window.openQuakeChatRuntimeConfig = {
          endpoint: opts.endpoint || '',
          apiKey: opts.api_key || '',
          model: opts.model || ''
        };
      } catch (e) {
        window.openQuakeChatRuntimeConfig = {};
      }
      return window.openQuakeChatRuntimeConfig;
    };
  </script>
  <script type="module">
    import ChatWidget, { mount } from './ChatWidget.js';
    const cfg = await window.openQuakeChatConfig();
    if (!(cfg.apiKey && cfg.endpoint)) {
      document.getElementById('nokey').style.display = 'flex';
    }
    mount(ChatWidget, { target: document.getElementById('chat-widget') });
  </script>

  <script>
    // ---- push-to-talk: panel relays the knob HOLD here (window.pttStart / window.pttStop).
    // Record the mic while held -> POST to OWUI's local-Whisper transcription -> fill the input + send.
    (function () {
      var cfg = window.openQuakeChatRuntimeConfig || {};
      var key = cfg.apiKey || '';
      var sttUrl = '';
      try { sttUrl = new URL(cfg.endpoint).origin + '/api/v1/audio/transcriptions'; } catch (e) {}
      var rec = null, chunks = [], stream = null, recording = false, cue = null;

      function showCue(on) {
        if (!cue) {
          cue = document.createElement('div'); cue.textContent = '🎤 listening…';
          cue.style.cssText = 'position:absolute;top:14px;right:18px;background:#16202e;color:#7CFFB2;padding:7px 16px;border-radius:20px;font:700 17px "Segoe UI";z-index:40;display:none';
          document.body.appendChild(cue);
        }
        cue.textContent = (on === 'work') ? '… transcribing' : '🎤 listening…';
        cue.style.display = on ? 'block' : 'none';
      }

      async function getMic() {
        if (stream) return stream;
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });   // unlocks device labels
        try {
          var devs = await navigator.mediaDevices.enumerateDevices();
          var pnp = devs.find(function (d) { return d.kind === 'audioinput' && /pnp|usb pnp|usb audio/i.test(d.label); });
          if (pnp && stream.getAudioTracks()[0].getSettings().deviceId !== pnp.deviceId) {
            stream.getTracks().forEach(function (t) { t.stop(); });
            stream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: { exact: pnp.deviceId } } });
          }
        } catch (e) {}
        return stream;
      }

      window.pttStart = async function () {
        if (recording || !sttUrl || !key) return;
        try {
          var s = await getMic();
          chunks = []; rec = new MediaRecorder(s);
          rec.ondataavailable = function (e) { if (e.data && e.data.size) chunks.push(e.data); };
          rec.onstop = function () { showCue('work'); transcribe(new Blob(chunks, { type: rec.mimeType || 'audio/webm' })); };
          rec.start(); recording = true; showCue(true);
        } catch (e) { console.log('ptt start:', e.message); }
      };
      window.pttStop = function () {
        if (!recording) return; recording = false;
        try { if (rec && rec.state !== 'inactive') rec.stop(); } catch (e) {}
      };

      async function transcribe(blob) {
        if (!blob || blob.size < 1200) { showCue(false); return; }   // ignore accidental taps
        try {
          var fd = new FormData(); fd.append('file', blob, 'speech.webm');
          var r = await fetch(sttUrl, { method: 'POST', headers: { Authorization: 'Bearer ' + key }, body: fd });
          var data = await r.json();
          var text = (data && (data.text || data.transcript || '')) || '';
          if (text.trim()) fillAndSend(text.trim());
        } catch (e) { console.log('stt:', e.message); }
        finally { showCue(false); }
      }

      function fillAndSend(text) {
        var ta = document.querySelector('textarea'); if (!ta) return;
        var setter = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value').set;
        setter.call(ta, text);                                   // set value + fire input so Svelte's bind picks it up
        ta.dispatchEvent(new Event('input', { bubbles: true }));
        ta.focus();
        setTimeout(function () { ta.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', bubbles: true })); }, 70);
      }
    })();
  </script>
</body>
</html>
