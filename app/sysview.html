<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' http: https: file: data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: file: http: https:; font-src 'self' data:; connect-src 'self'; media-src 'self' blob: data:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';">
<title>SystemView</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; width: 100%; height: 100%; }
  body { background: #05080d; color: #e8eef6; overflow: hidden; user-select: none;
    font-family: "Segoe UI", system-ui, sans-serif; }
  #wrap { display: flex; gap: 10px; width: 100vw; height: 100vh; padding: 10px; }
  .panel { background: linear-gradient(160deg, #0b1119, #070b11); border: 1px solid #141c28;
    border-radius: 14px; padding: 10px 14px; display: flex; flex-direction: column; min-width: 0; }
  .ptitle { font-size: 13px; letter-spacing: 1.5px; color: #7e93ab; text-transform: uppercase; flex: none; }
  .dim { color: #9fb3c8; }
  .body { flex: 1; display: flex; min-height: 0; }

  /* ---- left column: CPU + GPU cards (temp + load gauges each) ---- */
  .col { display: flex; flex-direction: column; gap: 10px; flex: 1.15; }
  .devcard { flex: 1; }
  .devhead { display: flex; align-items: baseline; gap: 10px; flex: none; }
  .devhead .name { font-size: 22px; font-weight: 800; }
  .devhead .sub { font-size: 12px; color: #7e93ab; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gauges { flex: 1; display: flex; align-items: center; justify-content: space-around; min-height: 0; }
  .gauge { position: relative; flex: 1; max-width: 50%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; }
  .gauge svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .gtrack { fill: none; stroke: #16202e; stroke-width: 10; }
  .garc { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset .5s ease; }
  .gtext { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .gval { font-size: 26px; font-weight: 800; line-height: 1; }
  .glbl { font-size: 12px; color: #7e93ab; margin-top: 3px; }

  /* ---- memory ---- */
  .mem { flex: 1; }
  .mem .body { flex-direction: column; justify-content: space-evenly; }
  .mrow .mhead { display: flex; justify-content: space-between; font-size: 17px; margin-bottom: 7px; }
  .mrow .k { color: #c7d4e2; font-weight: 600; } .mrow .v { color: #9fb3c8; }
  .bar { height: 14px; border-radius: 8px; background: #16202e; overflow: hidden; }
  .barfill { height: 100%; width: 0; border-radius: 8px; transition: width .5s ease; }

  /* ---- processes ---- */
  .proc { flex: 1.05; align-items: center; }
  .proc .body { flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .donut { position: relative; aspect-ratio: 1/1; height: 62%; max-height: 230px; border-radius: 50%;
    background: conic-gradient(from 0deg, #7CFFB2, #38b6ff, #b06cff, #7CFFB2); }
  .donut .hole { position: absolute; inset: 16%; background: #080d14; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .donut .htot { font-size: 44px; font-weight: 800; line-height: 1; }
  .donut .hlbl { font-size: 13px; color: #7e93ab; margin-top: 2px; }
  .legend { display: flex; gap: 18px; font-size: 14px; flex: none; }
  .legend span { display: flex; align-items: center; gap: 6px; color: #c7d4e2; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }

  /* ---- network + battery ---- */
  .netbatt { flex: .85; }
  .netbatt .body { flex-direction: column; justify-content: space-evenly; }
  .netrow { display: flex; align-items: baseline; gap: 12px; font-size: 34px; font-weight: 800; }
  .netrow .ar { font-size: 28px; width: 26px; text-align: center; }
  .netrow .u { font-size: 15px; color: #7e93ab; font-weight: 600; }
  .up { color: #7CFFB2; } .down { color: #38b6ff; }
  .battwrap { display: flex; align-items: center; gap: 16px; }
  .batt { width: 92px; height: 44px; border: 3px solid #3a4757; border-radius: 7px; position: relative; padding: 4px; flex: none; }
  .batt::after { content: ""; position: absolute; right: -9px; top: 12px; width: 6px; height: 16px; background: #3a4757; border-radius: 0 3px 3px 0; }
  .battfill { height: 100%; width: 0; background: #7CFFB2; border-radius: 3px; transition: width .5s ease; }
  .battpct { font-size: 32px; font-weight: 800; } .battsub { font-size: 13px; color: #9fb3c8; }

  /* ---- disk ---- */
  .disk { flex: 1.05; }
  .disk .body { flex-direction: column; justify-content: space-evenly; gap: 2px; }
  .drow .dhead { display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 5px; }
  .drow .k { color: #c7d4e2; font-weight: 700; } .drow .v { color: #9fb3c8; font-size: 14px; }
  .drow .bar { height: 11px; }

  #recon { position: fixed; right: 12px; bottom: 8px; font-size: 12px; color: #c98; opacity: 0; transition: opacity .3s; }
  #recon.show { opacity: 1; }
</style>
</head>
<body>
  <div id="wrap">
    <!-- CPU / GPU -->
    <div class="col">
      <div class="panel devcard">
        <div class="devhead"><span class="name">CPU</span><span class="sub" id="cpuName">processor</span></div>
        <div class="gauges">
          <div class="gauge"><svg viewBox="0 0 140 140"><circle class="gtrack" cx="70" cy="70" r="60"/><circle class="garc" id="cpuTempArc" cx="70" cy="70" r="60" stroke="#ff8a5c"/></svg>
            <div class="gtext"><div class="gval" id="cpuTempVal">—</div><div class="glbl">Temp</div></div></div>
          <div class="gauge"><svg viewBox="0 0 140 140"><circle class="gtrack" cx="70" cy="70" r="60"/><circle class="garc" id="cpuLoadArc" cx="70" cy="70" r="60" stroke="#7CFFB2"/></svg>
            <div class="gtext"><div class="gval" id="cpuLoadVal">—</div><div class="glbl">Load</div></div></div>
        </div>
      </div>
      <div class="panel devcard">
        <div class="devhead"><span class="name">GPU</span><span class="sub" id="gpuName">graphics</span></div>
        <div class="gauges">
          <div class="gauge"><svg viewBox="0 0 140 140"><circle class="gtrack" cx="70" cy="70" r="60"/><circle class="garc" id="gpuTempArc" cx="70" cy="70" r="60" stroke="#ff8a5c"/></svg>
            <div class="gtext"><div class="gval" id="gpuTempVal">—</div><div class="glbl">Temp</div></div></div>
          <div class="gauge"><svg viewBox="0 0 140 140"><circle class="gtrack" cx="70" cy="70" r="60"/><circle class="garc" id="gpuLoadArc" cx="70" cy="70" r="60" stroke="#38b6ff"/></svg>
            <div class="gtext"><div class="gval" id="gpuLoadVal">—</div><div class="glbl">Load</div></div></div>
        </div>
      </div>
    </div>

    <!-- Memory -->
    <div class="panel mem">
      <div class="ptitle">Memory</div>
      <div class="body">
        <div class="mrow"><div class="mhead"><span class="k">Total</span><span class="v" id="memTotal">—</span></div></div>
        <div class="mrow"><div class="mhead"><span class="k">Used</span><span class="v"><span id="memUsed">—</span> · <span id="memUsedPct">—</span></span></div>
          <div class="bar"><div class="barfill" id="memUsedBar" style="background:linear-gradient(90deg,#38b6ff,#7CFFB2)"></div></div></div>
        <div class="mrow"><div class="mhead"><span class="k">Free</span><span class="v"><span id="memFree">—</span> · <span id="memFreePct">—</span></span></div>
          <div class="bar"><div class="barfill" id="memFreeBar" style="background:#2a3a4d"></div></div></div>
      </div>
    </div>

    <!-- Processes -->
    <div class="panel proc">
      <div class="ptitle">Processes</div>
      <div class="body">
        <div class="donut" id="donut"><div class="hole"><div class="htot" id="procTotal">—</div><div class="hlbl">Total</div></div></div>
      </div>
    </div>

    <!-- Network + Battery -->
    <div class="panel netbatt">
      <div class="ptitle">Network</div>
      <div class="body">
        <div>
          <div class="netrow down"><span class="ar">↓</span><span id="netDown">—</span><span class="u" id="netDownU"></span></div>
          <div class="netrow up" style="margin-top:10px"><span class="ar">↑</span><span id="netUp">—</span><span class="u" id="netUpU"></span></div>
        </div>
        <div id="battBlock">
          <div class="ptitle" style="margin-bottom:8px">Battery</div>
          <div class="battwrap">
            <div class="batt"><div class="battfill" id="battFill"></div></div>
            <div><div class="battpct" id="battPct">—</div><div class="battsub" id="battState"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Disk -->
    <div class="panel disk">
      <div class="ptitle">Disk</div>
      <div class="body" id="disks"></div>
    </div>
  </div>
  <div id="recon">reconnecting…</div>

<script src="/sysview.js"></script>
</body>
</html>
