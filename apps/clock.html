<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Flip Clock</title>
<style>
  /* ---- theme ---- */
  :root {
    --bg: radial-gradient(120% 160% at 50% 0%, #0e1622 0%, #05080d 70%);
    --card-top: #20242c;
    --card-bottom: #141821;
    --digit: #aef4ff;
    --digit-glow: 0 0 18px rgba(120, 230, 255, .45);
    --fg: #aef4ff;                /* text on the page background (corner, colon) */
    --split: rgba(0, 0, 0, .55);
    --label: #6f8298;
    --accent: #7CFFB2;
    --radius: clamp(6px, 1.4vh, 16px);
  }
  body.classic {
    --bg: radial-gradient(120% 160% at 50% 0%, #2a2622 0%, #15120e 70%);
    --card-top: #f6f2e9;
    --card-bottom: #e4ddcf;
    --digit: #1b1b1b;
    --digit-glow: none;
    --fg: #d9cbb0;                /* light cream so corner/colon are visible on the dark classic bg */
    --split: rgba(0, 0, 0, .28);
    --label: #b9a98c;
    --accent: #c8a96b;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--label);
    display: flex; align-items: center; justify-content: center;
    -webkit-user-select: none; user-select: none; cursor: default;
  }

  #clock { display: flex; align-items: center; gap: var(--clock-gap, clamp(8px, 2.2vw, 48px)); }

  /* ---- flip group / card ---- */
  .group { display: flex; gap: var(--group-gap, clamp(4px, 0.8vw, 16px)); }
  .sep { align-self: center; display: flex; flex-direction: column; gap: var(--sep-gap, 16vh); }
  .sep i { width: var(--dot, clamp(8px, 1.4vh, 18px)); height: var(--dot, clamp(8px, 1.4vh, 18px)); border-radius: 50%;
    background: var(--fg); box-shadow: var(--digit-glow); display: block; }

  .card {
    position: relative;
    width: var(--cw); height: var(--ch);
    font-weight: 700; font-variant-numeric: tabular-nums;
    border-radius: var(--radius);
    filter: drop-shadow(0 12px 22px rgba(0, 0, 0, .5));
  }
  .card .half, .card .flap {
    position: absolute; left: 0; right: 0; height: 50%; overflow: hidden;
    display: block; backface-visibility: hidden;
  }
  .card .top    { top: 0;    border-radius: var(--radius) var(--radius) 0 0; background: var(--card-top);    border-bottom: 1px solid var(--split); }
  .card .bottom { bottom: 0; border-radius: 0 0 var(--radius) var(--radius); background: var(--card-bottom); }
  .card .d {
    position: absolute; left: 0; right: 0; height: var(--ch); line-height: var(--ch);
    text-align: center; font-size: var(--fs); color: var(--digit); text-shadow: var(--digit-glow);
  }
  .card .top .d    { top: 0; }       /* glyph aligned to card top  -> top half shows */
  .card .bottom .d { bottom: 0; }    /* glyph aligned to card bot  -> bottom half shows */

  /* animated flaps */
  .card .flap.top    { top: 0;    transform-origin: 50% 100%; transform: rotateX(0deg);   z-index: 2; }
  .card .flap.bottom { bottom: 0; transform-origin: 50% 0%;   transform: rotateX(90deg);  z-index: 2; }
  .card .flap.top    { border-radius: var(--radius) var(--radius) 0 0; background: var(--card-top);    border-bottom: 1px solid var(--split); }
  .card .flap.bottom { border-radius: 0 0 var(--radius) var(--radius); background: var(--card-bottom); }
  .card .flap.top.go    { animation: foldTop .28s ease-in forwards; }
  .card .flap.bottom.go { animation: foldBottom .28s ease-out .28s forwards; }
  @keyframes foldTop    { from { transform: rotateX(0deg); }  to { transform: rotateX(-90deg); } }
  @keyframes foldBottom { from { transform: rotateX(90deg); } to { transform: rotateX(0deg); } }

  /* ---- single wide hour card (12h) + AM/PM badge on it ---- */
  .card.wide { width: var(--cw2); }
  .card .ampm { position: absolute; top: 6%; left: 8%; z-index: 5; pointer-events: none;
    font-size: clamp(20px, 6.8vh, 80px); font-weight: 800; letter-spacing: .06em; color: var(--digit); text-shadow: var(--digit-glow); }
  /* ---- date / weekday, top-right corner ---- */
  #corner { position: fixed; top: clamp(8px, 3vh, 30px); right: clamp(12px, 3vw, 44px); text-align: right; line-height: 1.12; }
  #corner .cdate { display: block; font-size: clamp(13px, 4vh, 48px); color: var(--fg); text-shadow: var(--digit-glow); font-weight: 600; letter-spacing: .04em; }
  #corner .cdow  { display: block; font-size: clamp(12px, 3.4vh, 40px); color: var(--fg); text-shadow: var(--digit-glow); font-weight: 700; letter-spacing: .18em; }

  /* ---- settings ---- */
  #gear { position: fixed; top: 14px; right: 16px; width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--label);
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); cursor: pointer; opacity: .35; transition: opacity .15s; }
  #gear:hover { opacity: 1; }
  #panel { position: fixed; top: 60px; right: 16px; width: 230px; padding: 14px; border-radius: 12px; display: none;
    background: #0c1016ee; border: 1px solid #243246; color: #dbe5f0; font-size: 14px; }
  #panel.open { display: block; }
  #panel h4 { margin: 0 0 10px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: #6f8298; }
  #panel .row { display: flex; gap: 8px; margin: 8px 0; align-items: center; }
  #panel .seg { display: flex; flex: 1; border: 1px solid #2a3a4e; border-radius: 8px; overflow: hidden; }
  #panel .seg button { flex: 1; background: #131c28; color: #dbe5f0; border: 0; padding: 8px; cursor: pointer; font-size: 13px; }
  #panel .seg button.on { background: #1e6fd0; }
  #panel label { display: flex; align-items: center; gap: 8px; cursor: pointer; flex: 1; }
</style>
</head>
<body>
  <div id="clock"></div>
  <div id="corner"></div>

  <div id="gear" title="Settings">⚙</div>
  <div id="panel">
    <h4>Clock</h4>
    <div class="row"><span style="flex:1">Mode</span>
      <div class="seg"><button data-set="mode" data-val="24">24h</button><button data-set="mode" data-val="12">12h</button></div></div>
    <div class="row"><span style="flex:1">Theme</span>
      <div class="seg"><button data-set="theme" data-val="dark">Dark</button><button data-set="theme" data-val="classic">Classic</button></div></div>
    <div class="row"><label><input type="checkbox" data-toggle="seconds"> Show seconds</label></div>
    <div class="row"><label><input type="checkbox" data-toggle="date"> Show date &amp; day</label></div>
  </div>

<script src="clock.js"></script>
</body>
</html>
